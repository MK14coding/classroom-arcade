<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Punctuation Fix-Up</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.16), transparent 20%),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.14), transparent 18%),
        linear-gradient(135deg, #5a189a, #ef476f 54%, #ffd166);
      padding: 62px 14px 26px;
    }

    .back-link {
      position: fixed;
      top: 12px;
      left: 12px;
      background: white;
      color: #5a189a;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      z-index: 20;
    }

    .back-link:hover {
      background: #fff3d1;
    }

    .game-screen {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
      border: 4px solid rgba(255, 255, 255, 0.55);
      border-radius: 24px;
      background: rgba(50, 0, 80, 0.34);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.28);
    }

    .game-header {
      text-align: center;
    }

    .game-header h1 {
      margin: 0;
      font-size: 48px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 4px 4px 0 #3c096c;
    }

    .game-header p {
      margin: 8px 0 14px;
      font-size: 20px;
    }

    .setup-card,
    .scoreboard,
    .task-card {
      background: rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 18px;
    }

    .setup-card {
      padding: 14px;
      margin-bottom: 14px;
      text-align: center;
    }

    .setup-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .setup-row label {
      font-size: 20px;
      font-weight: bold;
    }

    select {
      min-height: 46px;
      min-width: 270px;
      max-width: 100%;
      padding: 0 12px;
      border: 3px solid white;
      border-radius: 12px;
      background: white;
      color: #5a189a;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      min-height: 46px;
      padding: 0 16px;
      border: none;
      border-radius: 12px;
      background: #ffd166;
      color: #3c096c;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffe08a;
    }

    #gameTypeInfo {
      margin: 10px 0 0;
      font-size: 17px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .score-card {
      padding: 12px;
      border-radius: 14px;
      text-align: center;
      background: rgba(255, 255, 255, 0.16);
      border: 3px solid rgba(255, 255, 255, 0.35);
    }

    .score-card span {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .score-card strong {
      display: block;
      font-size: 34px;
    }

    .task-card {
      padding: 18px;
      text-align: center;
    }

    .task-label {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: white;
      color: #5a189a;
      font-weight: bold;
      font-size: 18px;
    }

    .sentence-box {
      margin: 0 auto 18px;
      max-width: 820px;
      padding: 20px;
      background: white;
      color: #3c096c;
      border-radius: 18px;
      border: 4px solid #ffd166;
      font-size: 34px;
      font-weight: bold;
      line-height: 1.25;
      box-shadow: inset 0 -7px 0 rgba(0, 0, 0, 0.12);
    }

    .typing-area {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .typing-area label,
    .choice-area p {
      margin: 0;
      font-size: 19px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      max-width: 760px;
      padding: 14px;
      border: 3px solid white;
      border-radius: 14px;
      color: #3c096c;
      font-size: 24px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #ffd166;
      box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.28);
    }

    .choice-area {
      display: none;
    }

    .choice-buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .choice-button {
      width: 84px;
      height: 84px;
      font-size: 44px;
      border: 4px solid white;
    }

    #feedbackMessage {
      min-height: 30px;
      margin: 14px 0 0;
      font-size: 22px;
      font-weight: bold;
    }

    .correct-feedback {
      color: #b7ffbd;
    }

    .incorrect-feedback {
      color: #ffd2d2;
    }

    .answer-panel {
      display: none;
      margin: 10px auto 0;
      max-width: 820px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.35);
      text-align: left;
    }

    .answer-panel span {
      display: block;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .answer-panel strong {
      display: block;
      font-size: 20px;
      line-height: 1.35;
    }

    #nextButton {
      display: none;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      body {
        padding: 58px 8px 18px;
      }

      .game-screen {
        padding: 12px;
      }

      .game-header h1 {
        font-size: 31px;
      }

      .game-header p {
        font-size: 16px;
      }

      .scoreboard {
        grid-template-columns: 1fr;
      }

      .sentence-box {
        font-size: 24px;
        padding: 14px;
      }

      textarea {
        font-size: 20px;
      }

      .choice-button {
        width: 70px;
        height: 70px;
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">← Back to Arcade</a>

  <main class="game-screen">
    <header class="game-header">
      <h1>Punctuation Fix-Up</h1>
      <p>Fix the sentence or choose the correct punctuation mark.</p>
    </header>

    <section class="setup-card">
      <div class="setup-row">
        <label for="gameType">Choose a challenge</label>

        <select id="gameType">
          <option value="capitals">Full stops and capitals</option>
          <option value="speech">Speech marks</option>
          <option value="endmark">Guess the end mark</option>
          <option value="mixed">Mixed punctuation challenge</option>
        </select>

        <button id="newGameButton" type="button">New Game</button>
      </div>

      <p id="gameTypeInfo">Rewrite the sentence with capital letters and a full stop.</p>
    </section>

    <section class="scoreboard">
      <div class="score-card">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>

      <div class="score-card">
        <span>Question</span>
        <strong><span id="questionNumber">1</span>/<span id="totalQuestions">10</span></strong>
      </div>

      <div class="score-card">
        <span>Streak</span>
        <strong id="streak">0</strong>
      </div>
    </section>

    <section class="task-card">
      <div class="task-label" id="taskLabel">Fix this sentence</div>

      <p class="sentence-box" id="sentenceBox">the dog ran home</p>

      <div class="typing-area" id="typingArea">
        <label for="answerInput">Type the corrected sentence</label>
        <textarea id="answerInput" rows="3" autocomplete="off"></textarea>
        <button id="checkButton" type="button">Check Answer</button>
      </div>

      <div class="choice-area" id="choiceArea">
        <p>Which end mark should finish this sentence?</p>
        <div class="choice-buttons">
          <button class="choice-button" type="button" data-mark=".">.</button>
          <button class="choice-button" type="button" data-mark="?">?</button>
          <button class="choice-button" type="button" data-mark="!">!</button>
        </div>
      </div>

      <p id="feedbackMessage"></p>

      <div class="answer-panel" id="answerPanel">
        <span>Correct answer:</span>
        <strong id="correctAnswerText"></strong>
      </div>

      <button id="nextButton" type="button">Next Question</button>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const totalQuestions = 10;

      const gameDescriptions = {
        capitals: "Rewrite the sentence with capital letters and a full stop.",
        speech: "Rewrite the sentence with speech marks and correct punctuation.",
        endmark: "Choose whether the sentence needs a full stop, question mark or exclamation mark.",
        mixed: "A mix of capitals, full stops, speech marks and end marks."
      };

      const questionBanks = {
        capitals: [
          { prompt: "the dog ran home", answer: "The dog ran home." },
          { prompt: "my friend likes soccer", answer: "My friend likes soccer." },
          { prompt: "we went to the park", answer: "We went to the park." },
          { prompt: "sam ate his lunch", answer: "Sam ate his lunch." },
          { prompt: "the class worked quietly", answer: "The class worked quietly." },
          { prompt: "on monday we visited the library", answer: "On Monday we visited the library." },
          { prompt: "the bird flew over the fence", answer: "The bird flew over the fence." },
          { prompt: "mia found a shiny shell", answer: "Mia found a shiny shell." },
          { prompt: "ben packed his school bag", answer: "Ben packed his school bag." },
          { prompt: "the red bus stopped outside", answer: "The red bus stopped outside." }
        ],

        speech: [
          { prompt: "Tom said I am ready for school.", answer: 'Tom said, "I am ready for school."' },
          { prompt: "Mia asked Can I play too?", answer: 'Mia asked, "Can I play too?"' },
          { prompt: "Dad said Please pack your bag.", answer: 'Dad said, "Please pack your bag."' },
          { prompt: "The teacher said Line up quietly.", answer: 'The teacher said, "Line up quietly."' },
          { prompt: "Ava shouted Watch out!", answer: 'Ava shouted, "Watch out!"' },
          { prompt: "Noah asked Where is my hat?", answer: 'Noah asked, "Where is my hat?"' },
          { prompt: "Lily said I found the answer.", answer: 'Lily said, "I found the answer."' },
          { prompt: "Jack asked Are we nearly there?", answer: 'Jack asked, "Are we nearly there?"' },
          { prompt: "Mum said Dinner is ready.", answer: 'Mum said, "Dinner is ready."' },
          { prompt: "The coach shouted Great goal!", answer: 'The coach shouted, "Great goal!"' }
        ],

        endmark: [
          { prompt: "Where is my pencil", answer: "?" },
          { prompt: "The dog is sleeping", answer: "." },
          { prompt: "Watch out", answer: "!" },
          { prompt: "Can you help me", answer: "?" },
          { prompt: "I finished my work", answer: "." },
          { prompt: "What time is lunch", answer: "?" },
          { prompt: "That was amazing", answer: "!" },
          { prompt: "The book is on the desk", answer: "." },
          { prompt: "Please close the door", answer: "." },
          { prompt: "How did you solve it", answer: "?" }
        ]
      };

      const gameType = document.getElementById("gameType");
      const gameTypeInfo = document.getElementById("gameTypeInfo");
      const newGameButton = document.getElementById("newGameButton");
      const scoreDisplay = document.getElementById("score");
      const questionNumberDisplay = document.getElementById("questionNumber");
      const totalQuestionsDisplay = document.getElementById("totalQuestions");
      const streakDisplay = document.getElementById("streak");
      const taskLabel = document.getElementById("taskLabel");
      const sentenceBox = document.getElementById("sentenceBox");
      const typingArea = document.getElementById("typingArea");
      const choiceArea = document.getElementById("choiceArea");
      const answerInput = document.getElementById("answerInput");
      const checkButton = document.getElementById("checkButton");
      const feedbackMessage = document.getElementById("feedbackMessage");
      const answerPanel = document.getElementById("answerPanel");
      const correctAnswerText = document.getElementById("correctAnswerText");
      const nextButton = document.getElementById("nextButton");
      const choiceButtons = document.querySelectorAll(".choice-button");

      let score = 0;
      let streak = 0;
      let questionNumber = 1;
      let currentQuestion = null;
      let currentMode = "capitals";
      let answered = false;
      let usedQuestions = [];

      totalQuestionsDisplay.textContent = totalQuestions;

      function normaliseText(text) {
        return text
          .trim()
          .replace(/[“”]/g, '"')
          .replace(/[‘’]/g, "'")
          .replace(/\s+/g, " ")
          .replace(/\s+([,.!?])/g, "$1");
      }

      function chooseMode() {
        if (gameType.value !== "mixed") {
          return gameType.value;
        }

        const modes = ["capitals", "speech", "endmark"];
        return modes[Math.floor(Math.random() * modes.length)];
      }

      function chooseQuestion(mode) {
        const bank = questionBanks[mode];

        let available = bank.filter(function (_, index) {
          return !usedQuestions.includes(mode + "-" + index);
        });

        if (available.length === 0) {
          usedQuestions = usedQuestions.filter(function (item) {
            return !item.startsWith(mode + "-");
          });

          available = bank;
        }

        const question = available[Math.floor(Math.random() * available.length)];
        const originalIndex = bank.indexOf(question);

        usedQuestions.push(mode + "-" + originalIndex);

        return question;
      }

      function loadQuestion() {
        answered = false;
        currentMode = chooseMode();
        currentQuestion = chooseQuestion(currentMode);

        gameTypeInfo.textContent = gameDescriptions[gameType.value];
        questionNumberDisplay.textContent = questionNumber;
        scoreDisplay.textContent = score;
        streakDisplay.textContent = streak;

        sentenceBox.textContent = currentQuestion.prompt;
        answerInput.value = "";
        feedbackMessage.textContent = "";
        feedbackMessage.className = "";
        answerPanel.style.display = "none";
        correctAnswerText.textContent = "";
        nextButton.style.display = "none";

        if (currentMode === "endmark") {
          taskLabel.textContent = "Guess the end mark";
          typingArea.style.display = "none";
          choiceArea.style.display = "block";
        } else if (currentMode === "speech") {
          taskLabel.textContent = "Add speech marks";
          typingArea.style.display = "grid";
          choiceArea.style.display = "none";
          setTimeout(function () {
            answerInput.focus();
          }, 100);
        } else {
          taskLabel.textContent = "Add capitals and full stops";
          typingArea.style.display = "grid";
          choiceArea.style.display = "none";
          setTimeout(function () {
            answerInput.focus();
          }, 100);
        }
      }

      function markCorrect() {
        score++;
        streak++;
        feedbackMessage.textContent = "Correct! Great punctuation.";
        feedbackMessage.className = "correct-feedback";
      }

      function markIncorrect() {
        streak = 0;
        feedbackMessage.textContent = "Not quite. Check the correct answer below.";
        feedbackMessage.className = "incorrect-feedback";
        answerPanel.style.display = "block";

        if (currentMode === "endmark") {
          correctAnswerText.textContent = "The correct end mark is " + currentQuestion.answer;
        } else {
          correctAnswerText.textContent = currentQuestion.answer;
        }
      }

      function finishQuestion(isCorrect) {
        answered = true;

        if (isCorrect) {
          markCorrect();
        } else {
          markIncorrect();
        }

        scoreDisplay.textContent = score;
        streakDisplay.textContent = streak;
        nextButton.style.display = "inline-block";
      }

      function checkTypedAnswer() {
        if (answered) {
          return;
        }

        const studentAnswer = normaliseText(answerInput.value);
        const correctAnswer = normaliseText(currentQuestion.answer);

        if (studentAnswer === "") {
          feedbackMessage.textContent = "Type your answer first.";
          feedbackMessage.className = "incorrect-feedback";
          return;
        }

        finishQuestion(studentAnswer === correctAnswer);
      }

      function checkChoice(mark) {
        if (answered || currentMode !== "endmark") {
          return;
        }

        finishQuestion(mark === currentQuestion.answer);
      }

      function nextQuestion() {
        if (questionNumber >= totalQuestions) {
          sentenceBox.textContent = "Game complete!";
          taskLabel.textContent = "Final Score";
          typingArea.style.display = "none";
          choiceArea.style.display = "none";
          answerPanel.style.display = "none";
          feedbackMessage.textContent = "You scored " + score + " out of " + totalQuestions + ".";
          feedbackMessage.className = score >= 8 ? "correct-feedback" : "";
          nextButton.style.display = "none";
          return;
        }

        questionNumber++;
        loadQuestion();
      }

      function newGame() {
        score = 0;
        streak = 0;
        questionNumber = 1;
        usedQuestions = [];
        loadQuestion();
      }

      checkButton.addEventListener("click", checkTypedAnswer);

      answerInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          checkTypedAnswer();
        }
      });

      choiceButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          checkChoice(button.dataset.mark);
        });
      });

      nextButton.addEventListener("click", nextQuestion);
      newGameButton.addEventListener("click", newGame);

      gameType.addEventListener("change", function () {
        newGame();
      });

      newGame();
    });
  </script>
</body>
</html>
