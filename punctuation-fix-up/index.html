<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Punctuation Fix-Up</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a class="back-link" href="../index.html">← Back to Arcade</a>

  <main class="game-screen">
    <header class="game-header">
      <h1>Punctuation Fix-Up</h1>
      <p>Fix the sentence or choose the correct punctuation mark.</p>
    </header>

    <section class="setup-card">
      <div class="setup-row">
        <label for="gameType">Choose a challenge</label>

        <select id="gameType">
          <option value="capitals">Full stops and capitals</option>
          <option value="speech">Speech marks</option>
          <option value="endmark">Guess the end mark</option>
          <option value="mixed">Mixed punctuation challenge</option>
        </select>

        <button id="newGameButton">New Game</button>
      </div>

      <p id="gameTypeInfo">Rewrite the sentence with capital letters and a full stop.</p>
    </section>

    <section class="scoreboard">
      <div class="score-card">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>

      <div class="score-card">
        <span>Question</span>
        <strong><span id="questionNumber">1</span>/<span id="totalQuestions">10</span></strong>
      </div>

      <div class="score-card">
        <span>Streak</span>
        <strong id="streak">0</strong>
      </div>
    </section>

    <section class="task-card">
      <div class="task-label" id="taskLabel">Fix this sentence</div>

      <p class="sentence-box" id="sentenceBox">the dog ran home</p>

      <div class="typing-area" id="typingArea">
        <label for="answerInput">Type the corrected sentence</label>
        <textarea id="answerInput" rows="3" autocomplete="off"></textarea>
        <button id="checkButton">Check Answer</button>
      </div>

      <div class="choice-area" id="choiceArea">
        <p>Which end mark should finish this sentence?</p>
        <div class="choice-buttons">
          <button class="choice-button" data-mark=".">.</button>
          <button class="choice-button" data-mark="?">?</button>
          <button class="choice-button" data-mark="!">!</button>
        </div>
      </div>

      <p id="feedbackMessage"></p>

      <div class="answer-panel" id="answerPanel">
        <span>Correct answer:</span>
        <strong id="correctAnswerText"></strong>
      </div>

      <button id="nextButton">Next Question</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
